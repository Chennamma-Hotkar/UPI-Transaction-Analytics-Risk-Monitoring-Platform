<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UPI Risk Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
/* UPI Risk Analytics — Bloomberg-terminal density. Dark default, light variant. */

:root, [data-theme="dark"]{
  --bg: #0b0d10;
  --bg-1: #11141a;
  --bg-2: #161a21;
  --bg-3: #1d222b;
  --bg-hover: #1f2530;
  --fg: #e7eaf0;
  --fg-1: #b6bdc9;
  --fg-2: #7c8492;
  --fg-3: #4a525e;
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.12);
  --grid: rgba(255,255,255,0.04);
  --accent: #4cc4d7;
  --accent-soft: rgba(76,196,215,0.14);
  --ok: #6ec96a;
  --ok-soft: rgba(110,201,106,0.16);
  --warn: #f0b049;
  --warn-soft: rgba(240,176,73,0.16);
  --bad: #ec5b5b;
  --bad-soft: rgba(236,91,91,0.16);
  --p2p: #8a7df0;
  --merchant: #6ec96a;
  --utility: #f0b049;
  --retail: #4cc4d7;
}

[data-theme="light"]{
  --bg: #f6f6f3;
  --bg-1: #ffffff;
  --bg-2: #f0f0eb;
  --bg-3: #e6e6df;
  --bg-hover: #ececea;
  --fg: #181a1c;
  --fg-1: #34383d;
  --fg-2: #6a6f78;
  --fg-3: #a8adb5;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.16);
  --grid: rgba(0,0,0,0.05);
  --accent: #0d8b9e;
  --accent-soft: rgba(13,139,158,0.14);
  --ok: #2f8c2a;
  --ok-soft: rgba(47,140,42,0.14);
  --warn: #b87515;
  --warn-soft: rgba(184,117,21,0.14);
  --bad: #c93a3a;
  --bad-soft: rgba(201,58,58,0.14);
  --p2p: #5d4dcf;
  --merchant: #2f8c2a;
  --utility: #b87515;
  --retail: #0d8b9e;
}

*{box-sizing:border-box;margin:0;padding:0;}
html, body{height:100%;}
body{
  font-family: 'Geist', system-ui, -apple-system, sans-serif;
  font-size: 12px;
  background: var(--bg);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
.mono{ font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum" 1; letter-spacing:-0.01em; }
.num{ font-variant-numeric: tabular-nums; }
.dim{ color: var(--fg-2); }
.accent{ color: var(--accent); }
.bad-fg{ color: var(--bad); }
.warn-fg{ color: var(--warn); }
.ok-fg{ color: var(--ok); }
.bad-bg{ background: var(--bad); }
.accent-bg{ background: var(--accent); }
.cat-p2p-bg{ background: var(--p2p); }
.cat-merchant-bg{ background: var(--merchant); }
.cat-utility-bg{ background: var(--utility); }
.cat-retail-bg{ background: var(--retail); }

button{ font-family: inherit; font-size: inherit; cursor:pointer; border:0; background:transparent; color:inherit; }

/* ─── App shell ─── */
.app{
  display: grid;
  grid-template-columns: 200px 1fr;
  grid-template-rows: 44px 1fr;
  height: 100vh;
  width: 100vw;
}
.app.compact{ grid-template-columns: 56px 1fr; }
.app.dense{ font-size: 11px; }

.topbar{
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 14px;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg-1);
}
.brand{
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; letter-spacing: 0.04em; font-size: 13px;
}
.brand .logo{
  width: 16px; height: 16px;
  background: var(--accent);
  clip-path: polygon(0 0, 60% 0, 100% 50%, 60% 100%, 0 100%, 40% 50%);
}
.brand small{ font-weight: 500; color: var(--fg-2); letter-spacing: 0.06em; font-size: 10px; margin-left: 4px;}

.topbar-search{
  flex: 1; max-width: 360px;
  height: 26px;
  display: flex; align-items: center; gap: 6px;
  padding: 0 10px;
  border: 0.5px solid var(--border-strong);
  border-radius: 4px;
  background: var(--bg);
  color: var(--fg-2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.topbar-search input{
  flex: 1; background: transparent; border: 0; outline: 0; color: var(--fg);
  font-family: inherit; font-size: inherit;
}
.topbar-search kbd{
  font-size: 9px; padding: 1px 4px; border-radius: 3px;
  background: var(--bg-2); color: var(--fg-2);
  border: 0.5px solid var(--border);
}

.topbar-spacer{ flex:1; }
.topbar-meta{
  display: flex; align-items: center; gap: 14px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--fg-2);
}
.topbar-meta .live{
  display: inline-flex; align-items: center; gap: 5px;
  color: var(--ok);
}
.topbar-meta .live::before{
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--ok); box-shadow: 0 0 6px var(--ok);
  animation: pulse 1.6s infinite;
}
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ─── Sidebar ─── */
.sidebar{
  background: var(--bg-1);
  border-right: 0.5px solid var(--border);
  padding: 8px 0;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 2px;
}
.nav-grp{
  font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
  color: var(--fg-3); text-transform: uppercase;
  padding: 12px 14px 4px;
}
.nav-item{
  display: flex; align-items: center; gap: 10px;
  padding: 6px 14px;
  color: var(--fg-1);
  font-size: 12px;
  cursor: pointer;
  border-left: 2px solid transparent;
  position: relative;
}
.nav-item:hover{ background: var(--bg-2); }
.nav-item.active{
  background: var(--bg-2);
  color: var(--fg);
  border-left-color: var(--accent);
}
.nav-icon{
  width: 14px; height: 14px;
  display: flex; align-items: center; justify-content: center;
  color: var(--fg-2);
}
.nav-item.active .nav-icon{ color: var(--accent); }
.nav-badge{
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--bg-3); color: var(--fg-2);
}
.nav-badge.bad{ background: var(--bad-soft); color: var(--bad); }
.nav-badge.warn{ background: var(--warn-soft); color: var(--warn); }
.app.compact .nav-item span:not(.nav-badge), .app.compact .nav-grp{ display:none; }
.app.compact .nav-item{ justify-content: center; padding: 8px; }

.sidebar-foot{
  margin-top: auto;
  padding: 12px 14px;
  border-top: 0.5px solid var(--border);
  font-size: 10px; color: var(--fg-2);
  font-family: 'JetBrains Mono', monospace;
  display: flex; flex-direction: column; gap: 4px;
}
.sidebar-foot .stat{
  display: flex; justify-content: space-between;
}

/* ─── Main ─── */
.main{
  overflow: auto;
  padding: 12px;
  display: flex; flex-direction: column; gap: 10px;
}

/* ─── Page header ─── */
.page-hd{
  display: flex; align-items: center; gap: 14px;
  padding-bottom: 4px;
}
.page-hd h1{
  font-size: 16px; font-weight: 600; letter-spacing: -0.01em;
}
.page-hd .crumbs{
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-2);
}
.page-hd .actions{ margin-left:auto; display:flex; gap: 6px; }
.btn-sm{
  height: 24px; padding: 0 10px;
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
  border: 0.5px solid var(--border-strong);
  border-radius: 4px;
  background: var(--bg-1); color: var(--fg-1);
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-sm:hover{ background: var(--bg-2); color: var(--fg); }
.btn-sm.primary{ background: var(--accent); color: #001318; border-color: var(--accent); }

/* ─── Card ─── */
.card{
  background: var(--bg-1);
  border: 0.5px solid var(--border);
  border-radius: 4px;
  padding: 10px 12px;
  display: flex; flex-direction: column;
  min-width: 0;
}
.card-hd{
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
  gap: 8px;
}
.card-title{
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  color: var(--fg-2); text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 8px;
}
.pulse-dot{
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--bad); display: inline-block;
  box-shadow: 0 0 6px var(--bad);
  animation: pulse 1.4s infinite;
}

/* ─── Layouts ─── */
.row{ display: grid; gap: 10px; }
.r2{ grid-template-columns: repeat(2, 1fr); }
.r3{ grid-template-columns: repeat(3, 1fr); }
.r4{ grid-template-columns: repeat(4, 1fr); }
.r6{ grid-template-columns: repeat(6, 1fr); }
.r8{ grid-template-columns: repeat(8, 1fr); }
.r-21{ grid-template-columns: 2fr 1fr; }
.r-12{ grid-template-columns: 1fr 2fr; }
.r-32{ grid-template-columns: 3fr 2fr; }

/* ─── KPI ─── */
.kpi{
  background: var(--bg-1);
  border: 0.5px solid var(--border);
  border-top: 2px solid var(--accent);
  border-radius: 4px;
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 4px;
  min-width: 0;
}
.kpi-hd{
  display: flex; justify-content: space-between; align-items: center;
}
.kpi .lbl{
  font-size: 9px; letter-spacing: 0.1em; color: var(--fg-2); font-weight: 600;
}
.kpi-delta{ font-family: 'JetBrains Mono', monospace; font-size: 10px; }
.kpi-delta.good{ color: var(--ok); }
.kpi-delta.bad{ color: var(--bad); }
.kpi-delta.neutral{ color: var(--fg-2); }
.kpi-val{
  font-family: 'JetBrains Mono', monospace; font-weight: 600;
  font-size: 20px; letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.kpi-foot{
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-top: auto;
}
.kpi-sub{ font-size: 10px; color: var(--fg-2); font-family: 'JetBrains Mono', monospace; }

/* ─── Pills ─── */
.risk-pill{
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 28px; height: 18px;
  padding: 0 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600;
  border-radius: 3px;
  font-variant-numeric: tabular-nums;
}
.risk-pill.good{ background: var(--ok-soft); color: var(--ok); }
.risk-pill.warn{ background: var(--warn-soft); color: var(--warn); }
.risk-pill.bad{ background: var(--bad-soft); color: var(--bad); }
.cat-pill{
  display: inline-block;
  padding: 1px 6px;
  font-size: 10px; font-weight: 500;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
}
.cat-p2p{ background: rgba(138,125,240,0.18); color: var(--p2p); }
.cat-merchant{ background: rgba(110,201,106,0.18); color: var(--merchant); }
.cat-utility{ background: rgba(240,176,73,0.18); color: var(--utility); }
.cat-retail{ background: rgba(76,196,215,0.18); color: var(--retail); }
.flag-pill{
  display: inline-block; padding: 0 5px; height: 16px; line-height: 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600;
  border-radius: 2px;
}
.flag-pill.bad{ background: var(--bad); color: #fff; }
.flag-pill.warn{ background: var(--warn-soft); color: var(--warn); border: 0.5px solid var(--warn); }
.badge{
  display: inline-flex; align-items: center;
  padding: 1px 6px; height: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 600; letter-spacing: 0.04em;
  border-radius: 2px;
}
.badge.bad{ background: var(--bad-soft); color: var(--bad); }
.badge.warn{ background: var(--warn-soft); color: var(--warn); }
.badge.ok{ background: var(--ok-soft); color: var(--ok); }
.badge.accent{ background: var(--accent-soft); color: var(--accent); }

/* ─── Live feed ─── */
.live-card{ padding: 0; overflow: hidden; }
.live-card .card-hd{ padding: 10px 12px; margin: 0; border-bottom: 0.5px solid var(--border); }
.feed-table{
  display: flex; flex-direction: column;
}
.feed-row{
  display: grid;
  grid-template-columns: 110px 100px 90px 72px 80px 100px 90px 56px 72px;
  gap: 8px;
  padding: 6px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  align-items: center;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
}
.feed-row > span{ overflow:hidden; text-overflow: ellipsis; white-space: nowrap; }
.feed-row:hover{ background: var(--bg-2); }
.feed-row.alert{ background: rgba(236,91,91,0.04); }
.feed-row.alert:hover{ background: rgba(236,91,91,0.10); }
.feed-hd{
  font-size: 9px; color: var(--fg-2); font-weight: 600;
  letter-spacing: 0.08em; padding: 6px 12px;
  border-bottom: 0.5px solid var(--border-strong);
  background: var(--bg-2);
  cursor: default;
}
.feed-hd:hover{ background: var(--bg-2); }
.feed-body{ overflow-y: auto; }
.feed-body::-webkit-scrollbar{ width: 6px; }
.feed-body::-webkit-scrollbar-thumb{ background: var(--border-strong); border-radius: 3px;}
.feed-foot{
  display: flex; justify-content: space-between;
  padding: 6px 12px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--fg-2);
  border-top: 0.5px solid var(--border);
  background: var(--bg-2);
}
@keyframes flashIn{ from{ background: var(--accent-soft); } to{ background: transparent; } }
.feed-row.new{ animation: flashIn 1s ease; }

/* ─── Segmented ─── */
.seg{
  display: inline-flex;
  border: 0.5px solid var(--border-strong);
  border-radius: 4px;
  overflow: hidden;
  height: 22px;
}
.seg-btn{
  height: 100%;
  padding: 0 10px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--fg-2);
  border-right: 0.5px solid var(--border);
}
.seg-btn:last-child{ border-right: 0; }
.seg-btn:hover{ color: var(--fg); background: var(--bg-2); }
.seg-btn.active{ background: var(--accent-soft); color: var(--accent); }

/* ─── Histogram ─── */
.hist{
  display: flex; align-items: flex-end; justify-content: space-between;
  height: 130px;
  gap: 4px;
  padding-bottom: 4px;
}
.hist-col{
  flex: 1;
  display: flex; flex-direction: column; align-items: center;
  height: 100%;
  gap: 4px;
}
.hist-cnt{ font-size: 9px; color: var(--fg-2); }
.hist-bar-wrap{
  flex: 1; width: 100%;
  display: flex; align-items: flex-end;
}
.hist-bar{
  width: 100%; min-height: 2px;
  border-radius: 2px 2px 0 0;
}
.hist-bar.green{ background: var(--ok); }
.hist-bar.amber{ background: var(--warn); }
.hist-bar.red{ background: var(--bad); }
.hist-lbl{ font-size: 9px; color: var(--fg-3); }
.hist-foot{
  display: flex; gap: 14px; padding-top: 6px;
  border-top: 0.5px solid var(--border);
  font-size: 10px; color: var(--fg-2);
  font-family: 'JetBrains Mono', monospace;
}
.sw{ display: inline-block; width: 8px; height: 8px; border-radius: 1px; margin-right: 5px; vertical-align: middle; }
.sw.green{ background: var(--ok); }
.sw.amber{ background: var(--warn); }
.sw.red{ background: var(--bad); }

/* ─── Velocity ─── */
.vel-num{
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; font-size: 26px; color: var(--bad);
  font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
}
.vel-unit{ font-size: 11px; color: var(--fg-2); font-weight: 400; margin-left: 2px; }
.vel-bars{
  display: flex; align-items: flex-end; gap: 3px; height: 50px; margin: 6px 0;
}
.vel-b{
  flex: 1; min-height: 3px;
  background: var(--accent-soft); border-radius: 1px;
}
.vel-b.hot{ background: var(--bad); }
.vel-foot{ font-size: 10px; }

/* ─── Bank table ─── */
.bank-tbl, .model-tbl, .mule-tbl{
  display: flex; flex-direction: column;
}
.bank-row{
  display: grid;
  grid-template-columns: 50px 1fr 60px 50px 70px 60px;
  gap: 6px; align-items: center;
  padding: 4px 0;
  border-bottom: 0.5px solid var(--border);
  font-size: 11px;
}
.bank-row:last-child{ border-bottom: 0; }
.bank-hd{
  font-size: 9px; color: var(--fg-2); font-weight: 600;
  letter-spacing: 0.08em; padding-bottom: 4px;
  border-bottom: 0.5px solid var(--border-strong);
}
.bank-bar{
  display: block; height: 4px; background: var(--bg-3); border-radius: 2px; overflow: hidden;
}
.bank-bar > span{ display: block; height: 100%; background: var(--bad); }

/* ─── Category mix ─── */
.catmix{ display: flex; flex-direction: column; gap: 8px; }
.catmix-row{ display: flex; flex-direction: column; gap: 4px; }
.catmix-hd{ display: flex; justify-content: space-between; align-items: center; font-size: 10px; }
.catmix-bars{ display: flex; flex-direction: column; gap: 3px; }
.catmix-bar{
  position: relative;
  height: 16px;
  background: var(--bg-3);
  border-radius: 2px;
  overflow: hidden;
}
.catmix-bar .fill{
  display: block; height: 100%;
}
.catmix-bar label{
  position: absolute; left: 6px; top: 0; height: 16px; line-height: 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  color: var(--fg);
  mix-blend-mode: difference;
}

/* ─── Geo ─── */
.geo-list{ display: flex; flex-direction: column; gap: 4px; }
.geo-row{
  display: grid;
  grid-template-columns: 80px 1fr 36px 50px;
  gap: 6px; align-items: center;
  padding: 3px 0;
  font-size: 11px;
}
.geo-city{ font-size: 11px; }
.geo-bar{
  display: block; height: 6px; background: var(--bg-3); border-radius: 2px; overflow: hidden;
}
.geo-bar > span{ display: block; height: 100%; }

/* ─── Patterns ─── */
.pat-list{ display: flex; flex-direction: column; gap: 6px; }
.pat-row{
  display: flex; flex-direction: column; gap: 3px;
  padding: 5px 0;
  border-bottom: 0.5px solid var(--border);
}
.pat-row:last-child{ border-bottom: 0; }
.pat-hd{
  display: grid;
  grid-template-columns: 8px 1fr 32px 28px;
  gap: 8px; align-items: center;
  font-size: 11px;
}
.pat-name{ font-weight: 500; }
.sev{
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
}
.sev-critical{ background: var(--bad); box-shadow: 0 0 6px var(--bad); }
.sev-high{ background: var(--warn); }
.sev-medium{ background: var(--accent); }
.pat-tags{
  display: flex; flex-wrap: wrap; gap: 4px;
  padding-left: 16px;
}
.chip{
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 2px;
  background: var(--bg-3);
  color: var(--fg-2);
  border: 0.5px solid var(--border);
}

/* ─── Mule network ─── */
.mule-wrap{ display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.mule-graph{ width: 100%; height: 220px; }
.mule-row{
  display: grid;
  grid-template-columns: 60px 40px 60px 36px 40px;
  gap: 6px; align-items: center;
  padding: 3px 0;
  font-size: 11px;
  border-bottom: 0.5px solid var(--border);
}
.mule-row:last-child{ border-bottom: 0; }
.mule-hd{ font-size: 9px; color: var(--fg-2); font-weight: 600; letter-spacing: 0.08em; border-bottom: 0.5px solid var(--border-strong); }

/* ─── Model perf ─── */
.model-row{
  display: grid;
  grid-template-columns: 1.2fr 0.7fr 0.7fr 0.7fr 0.6fr 0.7fr;
  gap: 6px; align-items: center;
  padding: 5px 0;
  font-size: 11px;
  border-bottom: 0.5px solid var(--border);
}
.model-row:last-child{ border-bottom: 0; }
.model-hd{ font-size: 9px; color: var(--fg-2); font-weight: 600; letter-spacing: 0.08em; border-bottom: 0.5px solid var(--border-strong); }
.status{
  display: inline-block; padding: 1px 5px;
  font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600;
  border-radius: 2px;
  text-align: center;
}
.status-live{ background: var(--ok-soft); color: var(--ok); }
.status-shadow{ background: var(--accent-soft); color: var(--accent); }
.status-fallback{ background: var(--bg-3); color: var(--fg-2); }

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {
  return <div className="twk-sect">{label}</div>;
}
function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}
function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (trackRef.current) { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); } };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
        ))}
      </div>
    </TweakRow>
  );
}
function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}
function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect, TweakColor,
});
  </script>

  <script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

function Spark({values, color, height=24, width=80, area=true}){
  const max = Math.max(...values), min = Math.min(...values);
  const range = max-min || 1;
  const pts = values.map((v,i)=>{
    const x = (i/(values.length-1))*width;
    const y = height - ((v-min)/range)*height;
    return [x,y];
  });
  const d = pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const fill = area ? `${d} L${width} ${height} L0 ${height} Z` : null;
  return (
    <svg width={width} height={height} style={{display:'block',overflow:'visible'}}>
      {area && <path d={fill} fill={color} opacity="0.12"/>}
      <path d={d} fill="none" stroke={color} strokeWidth="1.25"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="2" fill={color}/>
    </svg>
  );
}

function KpiCard({k, dense, sparkData}){
  const toneCol = k.tone==='good' ? 'var(--ok)' : k.tone==='bad' ? 'var(--bad)' : 'var(--fg-2)';
  const arrow = k.dir==='up' ? '▲' : k.dir==='down' ? '▼' : '·';
  return (
    <div className="kpi" style={{borderTopColor: k.tone==='bad' ? 'var(--bad)' : k.tone==='good' ? 'var(--ok)' : 'var(--accent)'}}>
      <div className="kpi-hd">
        <span className="lbl">{k.label}</span>
        <span className={`kpi-delta ${k.tone}`}>{arrow} {k.delta}</span>
      </div>
      <div className="kpi-val">{k.value}</div>
      <div className="kpi-foot">
        <span className="kpi-sub">{k.sub}</span>
        {sparkData && <Spark values={sparkData} color={toneCol} width={dense?56:72} height={18}/>}
      </div>
    </div>
  );
}

function RiskPill({score}){
  const tone = score>=70?'bad':score>=40?'warn':'good';
  return <span className={`risk-pill ${tone}`}>{score}</span>;
}
function CatPill({cat}){
  return <span className={`cat-pill cat-${cat.toLowerCase()}`}>{cat}</span>;
}
function FlagPill({flag}){
  if(!flag) return <span className="dim">—</span>;
  return <span className={`flag-pill ${flag==='BLOCK'?'bad':'warn'}`}>{flag}</span>;
}

function LiveFeed({feed, filter, setFilter, onSelect, animSpeed, dense, paused, setPaused}){
  const filtered = useMemo(()=>{
    return feed.filter(t=>{
      if(filter.kind==='all') return true;
      if(filter.kind==='fraud') return t.flag==='BLOCK';
      if(filter.kind==='high') return t.risk>=40;
      if(filter.kind==='p2p') return t.category==='P2P';
      return true;
    });
  },[feed,filter]);
  const fmt = (n) => '₹'+n.toLocaleString('en-IN');
  const time = (d) => d.toTimeString().slice(0,8);
  return (
    <div className="card live-card">
      <div className="card-hd">
        <span className="card-title">LIVE TRANSACTION FEED <span className="pulse-dot"/></span>
        <div className="seg">
          {[['all','All'],['fraud','Fraud'],['high','High risk'],['p2p','P2P']].map(([k,l])=>(
            <button key={k} className={'seg-btn'+(filter.kind===k?' active':'')} onClick={()=>setFilter({...filter,kind:k})}>{l}</button>
          ))}
          <button className={'seg-btn'+(paused?' active':'')} onClick={()=>setPaused(!paused)} title="Pause/resume">{paused?'▶':'❚❚'}</button>
        </div>
      </div>
      <div className="feed-table">
        <div className="feed-row feed-hd">
          <span>UPI ID</span><span>AMOUNT</span><span>CATEGORY</span><span>BANK</span>
          <span>APP</span><span>CITY</span><span>TIMESTAMP</span><span>RISK</span><span>FLAG</span>
        </div>
        <div className="feed-body" style={{maxHeight: dense?'460px':'520px'}}>
          {filtered.slice(0,40).map((t,i)=>(
            <div key={t.id+i} className={'feed-row'+(t.flag==='BLOCK'?' alert':'')} onClick={()=>onSelect(t)}>
              <span className="mono accent">{t.id}</span>
              <span className="mono num">{fmt(t.amount)}</span>
              <span><CatPill cat={t.category}/></span>
              <span className="mono">{t.bank}</span>
              <span className="mono dim">{t.app}</span>
              <span className="mono dim">{t.city}</span>
              <span className="mono dim">{time(t.timestamp)}</span>
              <span><RiskPill score={t.risk}/></span>
              <span><FlagPill flag={t.flag}/></span>
            </div>
          ))}
        </div>
      </div>
      <div className="feed-foot">
        <span>{filtered.length} txn · streaming @ {animSpeed===0?'paused':animSpeed+'/s'}</span>
        <span className="dim">P99 42ms · ingest healthy</span>
      </div>
    </div>
  );
}

function RiskDistribution(){
  const max = Math.max(...RISK_DIST.map(d=>d.count));
  return (
    <div className="card">
      <div className="card-hd"><span className="card-title">RISK SCORE DISTRIBUTION</span><span className="dim mono">48.2M txns / 24h</span></div>
      <div className="hist">
        {RISK_DIST.map(d=>(
          <div key={d.bucket} className="hist-col">
            <div className="hist-cnt mono">{d.count>=1000?(d.count/1000).toFixed(1)+'k':d.count}</div>
            <div className="hist-bar-wrap">
              <div className={`hist-bar ${d.color}`} style={{height: Math.max(2, Math.log(d.count+1)/Math.log(max+1)*100)+'%'}}/>
            </div>
            <div className="hist-lbl mono">{d.bucket}</div>
          </div>
        ))}
      </div>
      <div className="hist-foot">
        <span><i className="sw green"/>Safe (0–39)</span>
        <span><i className="sw amber"/>Review (40–69)</span>
        <span><i className="sw red"/>Block (70+)</span>
      </div>
    </div>
  );
}

function VelocityCard(){
  const max = Math.max(...VELOCITY_SERIES);
  return (
    <div className="card">
      <div className="card-hd"><span className="card-title">FRAUD VELOCITY · 6H</span><span className="badge bad">ATTACK WAVE</span></div>
      <div className="vel-num">21<span className="vel-unit">/hr</span></div>
      <div className="vel-bars">
        {VELOCITY_SERIES.map((v,i)=>(
          <div key={i} className={'vel-b'+(v>10?' hot':'')} style={{height:(v/max*100)+'%'}}/>
        ))}
      </div>
      <div className="vel-foot mono dim">threshold breach @ 3/hr · +600% vs baseline</div>
    </div>

}

function BankBreakdown(){
  const maxFraud = Math.max(...BANK_STATS.map(b=>b.fraudRate));
  return (
    <div className="card">
      <div className="card-hd"><span className="card-title">BANK-WISE FRAUD RATE</span><span className="dim mono">last 24h</span></div>
      <div className="bank-tbl">
        <div className="bank-row bank-hd">
          <span>BANK</span><span>VOLUME</span><span>TXNS</span><span>FRAUD</span><span>RATE</span><span></span>
        </div>
        {BANK_STATS.map(b=>(
          <div key={b.bank} className="bank-row">
            <span className="mono">{b.bank}</span>
            <span className="mono num">{b.vol}</span>
            <span className="mono num dim">{(b.txns/1e6).toFixed(2)}M</span>
            <span className="mono num">{b.fraud}</span>
            <span className={`mono num ${b.fraudRate>0.01?'bad-fg':'ok-fg'}`}>{(b.fraudRate*100).toFixed(3)}%</span>
            <span className="bank-bar"><span style={{width:(b.fraudRate/maxFraud*100)+'%'}}/></span>
          </div>
        ))}
      </div>
    </div>
  );
}

function CategoryMix(){
  return (
    <div className="card">
      <div className="card-hd"><span className="card-title">CATEGORY MIX</span><span className="dim mono">share / fraud share</span></div>
      <div className="catmix">
        {CATEGORY_MIX.map(c=>(
          <div key={c.cat} className="catmix-row">
            <div className="catmix-hd">
              <CatPill cat={c.cat}/>
              <span className="mono dim">{c.txns}</span>
            </div>
            <div className="catmix-bars">
              <div className="catmix-bar"><span className={`fill cat-${c.tone}-bg`} style={{width:(c.share*100)+'%'}}/><label>vol {(c.share*100).toFixed(0)}%</label></div>
              <div className="catmix-bar"><span className="fill bad-bg" style={{width:(c.fraudShare*100)+'%'}}/><label>fraud {(c.fraudShare*100).toFixed(0)}%</label></div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function GeoAnomaly(){
  const max = Math.max(...GEO_ANOMALIES.map(g=>g.count));
  return (
    <div className="card">
      <div className="card-hd"><span className="card-title">GEOGRAPHIC ANOMALY</span><span className="dim mono">city · vs 30d baseline</span></div>
      <div className="geo-list">
        {GEO_ANOMALIES.map(g=>{
          const spike = g.pct>50;
          return (
            <div key={g.city} className="geo-row">
              <span className="geo-city">{g.city}</span>
              <span className="geo-bar"><span className={spike?'bad-bg':'accent-bg'} style={{width:(g.count/max*100)+'%'}}/></span>
              <span className="mono num">{g.count}</span>
              <span className={'mono '+(g.pct>50?'bad-fg':g.pct>0?'warn-fg':g.pct<-10?'ok-fg':'dim')}>{g.pct>0?'+':''}{g.pct}%</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AttackPatterns(){
  return (
    <div className="card">
      <div className="card-hd"><span className="card-title">ATTACK PATTERNS · 1H</span><span className="dim mono">detector v4.2</span></div>
      <div className="pat-list">
        {ATTACK_PATTERNS.map(p=>(
          <div key={p.name} className="pat-row">
            <div className="pat-hd">
              <span className={`sev sev-${p.severity}`}/>
              <span className="pat-name">{p.name}</span>
              <span className={'mono '+(p.severity==='critical'?'bad-fg':p.severity==='high'?'warn-fg':'dim')}>{p.count}</span>
              <span className="mono dim">{p.change!=='0'?p.change:'—'}</span>
            </div>
            <div className="pat-tags">
              {p.tags.map(t=><span key={t} className="chip">{t}</span>)}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function MuleNetwork(){
  const nodes = MULE_NODES;
  const cx = 180, cy = 110, r = 80;
  return (
    <div className="card">
      <div className="card-hd"><span className="card-title">MULE NETWORK · DETECTED CHAINS</span><span className="badge bad">147 NODES</span></div>
      <div className="mule-wrap">
        <svg className="mule-graph" viewBox="0 0 360 220">
          {nodes.map((n,i)=>{
            const a = (i/nodes.length)*Math.PI*2 - Math.PI/2;
            const x = cx + Math.cos(a)*r;
            const y = cy + Math.sin(a)*r;
            return <line key={'l'+i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--fg-3)" strokeWidth="0.5" strokeDasharray="2 2"/>;
          })}
          {nodes.map((n,i)=>{
            const a = (i/nodes.length)*Math.PI*2 - Math.PI/2;
            const x = cx + Math.cos(a)*r;
            const y = cy + Math.sin(a)*r;
            const sz = 4+n.degree*0.7;
            return (
              <g key={n.id}>
                <circle cx={x} cy={y} r={sz} fill="var(--bad)" opacity="0.85"/>
                <circle cx={x} cy={y} r={sz+3} fill="none" stroke="var(--bad)" opacity="0.25"/>
                <text x={x} y={y+sz+10} textAnchor="middle" fontSize="9" fill="var(--fg-2)" fontFamily="ui-monospace">{n.id}</text>
              </g>
            );
          })}
          <circle cx={cx} cy={cy} r="14" fill="var(--accent)" opacity="0.95"/>
          <text x={cx} y={cy+3} textAnchor="middle" fontSize="9" fill="var(--bg)" fontWeight="700" fontFamily="ui-monospace">DEST</text>
        </svg>
        <div className="mule-tbl">
          <div className="mule-row mule-hd"><span>NODE</span><span>TXNS</span><span>IN/OUT</span><span>DEG</span><span>RISK</span></div>
          {nodes.map(n=>(
            <div key={n.id} className="mule-row">
              <span className="mono accent">{n.id}</span>
              <span className="mono num">{n.txns}</span>

              <span className="mono num">{n.degree}</span>
              <span><RiskPill score={n.risk}/></span>

        </div>
      </div>

  );
}

function ModelPerf(){

function AlertFeed({alerts, onSelect}){
  return (
    <div className="card">

        {alerts.slice(0,8).map((a,i)=>(
          <div key={i} className="alert-row" onClick={()=>onSelect && onSelect(a)}>

            <span className="alert-msg">{a.msg}</span>
            <span className="mono dim">{a.txn}</span>
            <span className="mono dim">{a.time}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function TxnDrawer({txn, onClose, onAction}){
  if(!txn) return null;
  const fmt = (n) => '₹'+n.toLocaleString('en-IN');
  const features = [
    {k:'Risk score', v:txn.risk, type:'score'},
    {k:'Amount', v:fmt(txn.amount)},
    {k:'Category', v:txn.category},
    {k:'Payer VPA', v:txn.payer, mono:true},
    {k:'Payee VPA', v:txn.payee, mono:true},
    {k:'Bank (from→to)', v:`${txn.bank} → ${txn.bankTo}`},
    {k:'App', v:txn.app},
    {k:'City', v:txn.city},
    {k:'Device', v:txn.device, mono:true},
    {k:'IP address', v:txn.ip, mono:true},
    {k:'Velocity (1h)', v:txn.velocity+' txns'},
    {k:'New device', v:txn.newDevice?'YES':'no', tone:txn.newDevice?'bad':null},
    {k:'New payee', v:txn.newPayee?'YES':'no', tone:txn.newPayee?'warn':null},
  ];
  const rules = [
    {name:'AMOUNT_ROUND',      hit: txn.amount%1000===0,                          weight:8},
    {name:'NEW_PAYEE_HIGH_AMT',hit: txn.newPayee && txn.amount>20000,             weight:24},
    {name:'NEW_DEVICE',        hit: txn.newDevice,                                weight:18},
    {name:'OFF_HOURS',         hit: txn.timestamp.getHours()<6||txn.timestamp.getHours()>23, weight:14},
    {name:'VELOCITY>10',       hit: txn.velocity>10,                              weight:21},
    {name:'P2P_HIGH_VAL',      hit: txn.category==='P2P' && txn.amount>30000,     weight:15},
  ];
  return (
    <div className="drawer-bg" onClick={onClose}>
      <div className="drawer" onClick={e=>e.stopPropagation()}>
        <div className="drawer-hd">
          <div>
            <div className="dr-id mono accent">{txn.id}</div>
            <div className="dr-time mono dim">{txn.timestamp.toString().slice(0,24)}</div>
          </div>
          <button className="x-btn" onClick={onClose}>✕</button>
        </div>
        <div className="drawer-banner">
          <RiskPill score={txn.risk}/>
          <span className="dr-amt mono">{fmt(txn.amount)}</span>
          <CatPill cat={txn.category}/>
          <FlagPill flag={txn.flag}/>
        </div>
        <div className="drawer-section">
          <div className="dr-hd">FEATURES</div>
          <div className="dr-features">
            {features.map(f=>(
              <div key={f.k} className="dr-feat">
                <span className="dr-k">{f.k}</span>
                <span className={`dr-v ${f.mono?'mono':''} ${f.tone?f.tone+'-fg':''}`}>{f.v}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="drawer-section">
          <div className="dr-hd">RULE EXPLANATION</div>
          <div className="dr-rules">
            {rules.map(r=>(
              <div key={r.name} className={'dr-rule '+(r.hit?'hit':'miss')}>
                <span className="mono">{r.hit?'●':'○'}</span>
                <span className="mono">{r.name}</span>
                <span className="mono num dim">+{r.weight}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="drawer-actions">
          <button className="btn bad"   onClick={()=>onAction('block',txn)}>BLOCK</button>
          <button className="btn warn"  onClick={()=>onAction('review',txn)}>SEND TO REVIEW</button>
          <button className="btn ok"    onClick={()=>onAction('clear',txn)}>CLEAR</button>
          <button className="btn ghost" onClick={()=>onAction('escalate',txn)}>ESCALATE</button>
        </div>
      </div>
    </div>
  );
}

Object.assign(window,{

  LiveFeed, RiskDistribution, VelocityCard,
  BankBreakdown, CategoryMix, GeoAnomaly,
  AttackPatterns, MuleNetwork, ModelPerf, AlertFeed, TxnDrawer
});

  "showVelocity": true,
  "showBanks": true,
  "showCategory": true,
  "showGeo": true,
  "showPatterns": true,
  "showMule": true,
  "showModel": true,
  "showAlerts": true
};

  const map = {
    overview: <path d="M3 3h6v6H3zM11 3h6v3h-6zM11 8h6v6h-6zM3 11h6v3H3z" stroke="currentColor" strokeWidth="1" fill="none"/>,
    feed:     <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" strokeWidth="1"/>,
    risk:     <path d="M8 2L2 13h12z" stroke="currentColor" strokeWidth="1" fill="none"/>,
    mule:     <g><circle cx="4" cy="4" r="2" stroke="currentColor" fill="none"/><circle cx="12" cy="4" r="2" stroke="currentColor" fill="none"/><circle cx="8" cy="12" r="2" stroke="currentColor" fill="none"/><path d="M5 5l3 6M11 5l-3 6" stroke="currentColor"/></g>,
    alerts:   <path d="M8 2c-2 0-4 2-4 4v3l-1 2h10l-1-2V6c0-2-2-4-4-4zM6 13c0 1 1 2 2 2s2-1 2-2" stroke="currentColor" strokeWidth="1" fill="none"/>,
    model:    <g><circle cx="4" cy="8" r="1.5" stroke="currentColor" fill="none"/><circle cx="12" cy="4" r="1.5" stroke="currentColor" fill="none"/><circle cx="12" cy="12" r="1.5" stroke="currentColor" fill="none"/><path d="M5 8l6-3M5 8l6 3" stroke="currentColor"/></g>,
    geo:      <g><circle cx="8" cy="8" r="6" stroke="currentColor" fill="none"/><path d="M2 8h12M8 2c2 2 2 10 0 12M8 2c-2 2-2 10 0 12" stroke="currentColor" fill="none"/></g>,

const NAV = [
  {grp:'OPS', items:[
    {id:'overview', label:'Overview',    icon:'overview'},
    {id:'feed',     label:'Live Feed',   icon:'feed',    badge:'LIVE', tone:'bad'},
    {id:'alerts',   label:'Alerts',      icon:'alerts',  badge:'47',   tone:'bad'},
  ]},
  {grp:'INTELLIGENCE', items:[
    {id:'risk',     label:'Risk Models', icon:'model'},
    {id:'mule',     label:'Mule Network',icon:'mule',    badge:'147'},
    {id:'patterns', label:'Attack Patterns', icon:'risk'},
    {id:'geo',      label:'Geographic',  icon:'geo',     badge:'+332%', tone:'warn'},
    {id:'banks',    label:'Bank Analytics', icon:'bank'},
  ]},
  {grp:'SYSTEM', items:[
    {id:'analyst',  label:'Analysts',    icon:'user'},
    {id:'settings', label:'Settings',    icon:'cog'},

function Sidebar({active, setActive}){
  return (
    <aside className="sidebar">
      {NAV.map(g => (
        <React.Fragment key={g.grp}>
          <div className="nav-grp">{g.grp}</div>
          {g.items.map(it => (
            <div key={it.id} className={'nav-item'+(active===it.id?' active':'')} onClick={()=>setActive(it.id)}>
              <span className="nav-icon"><Icon name={it.icon}/></span>
              <span>{it.label}</span>
              {it.badge && <span className={'nav-badge '+(it.tone||'')}>{it.badge}</span>}
            </div>
          ))}
        </React.Fragment>
      ))}
      <div className="sidebar-foot">
        <div className="stat"><span>INGEST</span><span className="ok-fg">● HEALTHY</span></div>
        <div className="stat"><span>P99</span><span>42ms</span></div>
        <div className="stat"><span>VERSION</span><span>v4.2.1</span></div>
      </div>
    </aside>
  );
}

function Topbar({time}){
  return (
    <header className="topbar">
      <div className="brand">
        <div className="logo"/>
        UPI<small>RISK ANALYTICS</small>
      </div>
      <div className="topbar-search">
        <span>⌕</span>
        <input placeholder="Search UPI ID, VPA, device, IP, payee..."/>
        <kbd>⌘K</kbd>
      </div>
      <div className="topbar-spacer"/>
      <div className="topbar-meta">
        <span className="live">STREAMING</span>
        <span>NPCI · prod-mum</span>
        <span>{time}</span>
        <span className="mono">analyst@risk-ops</span>
      </div>
    </header>
  );
}

const SPARKS = {
  tpv:      [82,84,81,86,88,92,94,96,93,98,102,104],
  blocked:  [4,6,5,8,7,11,9,14,12,16,18,21],
  velocity: [3,3,5,8,14,21],
  recall:   [93.8,93.9,94.0,94.1,94.0,94.1],
  fpr:      [2.1,2.0,1.9,1.8,1.9,1.8],
  p99:      [50,48,46,44,43,42],
  mules:    [120,124,128,132,138,144,147],
  analyst:  [101,98,95,92,90,89],
};

function OverviewPage({tweaks, feed, alerts, onSelectTxn, filter, setFilter, paused, setPaused}){
  const layout = tweaks.layout || 'grid';
  const dense  = tweaks.density === 'compact';

  if(layout === 'command'){
    return (
      <>
        <div className="page-hd">
          <h1>Command Center</h1><span className="crumbs">/ ops / overview</span>
          <div className="actions">
            <button className="btn-sm">Export</button>
            <button className="btn-sm primary">Sound alarms</button>
          </div>
        </div>
        {tweaks.showKpis && <div className="row r4">{KPIS.slice(0,4).map(k=><KpiCard key={k.key} k={k} sparkData={SPARKS[k.key]} dense={dense}/>)}</div>}
        <div className="row r-32">
          {tweaks.showFeed && <LiveFeed feed={feed} filter={filter} setFilter={setFilter} onSelect={onSelectTxn} animSpeed={tweaks.animSpeed} dense={dense} paused={paused} setPaused={setPaused}/>}
          <div className="row" style={{gridTemplateRows:'auto auto', gap:10}}>
            {tweaks.showVelocity && <VelocityCard/>}
            {tweaks.showAlerts && <AlertFeed alerts={alerts}/>}
          </div>
        </div>
        <div className="row r3">
          {tweaks.showPatterns && <AttackPatterns/>}
          {tweaks.showGeo && <GeoAnomaly/>}
          {tweaks.showRiskDist && <RiskDistribution/>}
        </div>
        <div className="row r2">
          {tweaks.showMule && <MuleNetwork/>}
          {tweaks.showCategory && <CategoryMix/>}
        </div>
        {tweaks.showBanks && <div className="row r-12"><BankBreakdown/>{tweaks.showModel && <ModelPerf/>}</div>}
      </>
    );
  }

  if(layout === 'trader'){
    return (
      <>
        <div className="page-hd"><h1>Trader View</h1><span className="crumbs">/ ops / overview · max density</span></div>
        {tweaks.showKpis && <div className="row r8">{KPIS.map(k=><KpiCard key={k.key} k={k} sparkData={SPARKS[k.key]} dense={true}/>)}</div>}
        <div className="row r2">
          {tweaks.showFeed && <LiveFeed feed={feed} filter={filter} setFilter={setFilter} onSelect={onSelectTxn} animSpeed={tweaks.animSpeed} dense={true} paused={paused} setPaused={setPaused}/>}
          <div className="row" style={{gridTemplateRows:'1fr 1fr', gap:10}}>
            {tweaks.showAlerts && <AlertFeed alerts={alerts}/>}
            {tweaks.showVelocity && <VelocityCard/>}
          </div>
        </div>
        <div className="row r4">
          {tweaks.showRiskDist && <RiskDistribution/>}
          {tweaks.showPatterns && <AttackPatterns/>}
          {tweaks.showGeo && <GeoAnomaly/>}
          {tweaks.showCategory && <CategoryMix/>}
        </div>
        <div className="row r2">
          {tweaks.showMule && <MuleNetwork/>}
          {tweaks.showBanks && <BankBreakdown/>}
        </div>
        {tweaks.showModel && <ModelPerf/>}
      </>
    );
  }

  // Default: grid
  return (
    <>
      <div className="page-hd">
        <h1>Overview</h1><span className="crumbs">/ ops / overview</span>
        <div className="actions">
          <button className="btn-sm">24h</button>
          <button className="btn-sm">7d</button>
          <button className="btn-sm">Export</button>
        </div>
      </div>
      {tweaks.showKpis && <div className="row r4">{KPIS.slice(0,4).map(k=><KpiCard key={k.key} k={k} sparkData={SPARKS[k.key]} dense={dense}/>)}</div>}
      <div className="row r4">{KPIS.slice(4).map(k=><KpiCard key={k.key} k={k} sparkData={SPARKS[k.key]} dense={dense}/>)}</div>
      {tweaks.showFeed && <LiveFeed feed={feed} filter={filter} setFilter={setFilter} onSelect={onSelectTxn} animSpeed={tweaks.animSpeed} dense={dense} paused={paused} setPaused={setPaused}/>}
      <div className="row r3">
        {tweaks.showVelocity && <VelocityCard/>}
        {tweaks.showRiskDist && <RiskDistribution/>}
        {tweaks.showPatterns && <AttackPatterns/>}
      </div>
      <div className="row r-21">
        {tweaks.showBanks && <BankBreakdown/>}
        {tweaks.showCategory && <CategoryMix/>}
      </div>
      <div className="row r-12">
        {tweaks.showGeo && <GeoAnomaly/>}
        {tweaks.showMule && <MuleNetwork/>}
      </div>
      <div className="row r2">
        {tweaks.showModel && <ModelPerf/>}
        {tweaks.showAlerts && <AlertFeed alerts={alerts}/>}
      </div>
    </>
  );
}

function AppTweaks({t, setTweak}){
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Theme"/>
      <TweakRadio label="Mode" value={t.theme} options={['dark','light']} onChange={v=>setTweak('theme',v)}/>
      <TweakColor label="Accent" value={t.accent} onChange={v=>setTweak('accent',v)}/>
      <TweakSection label="Layout"/>
      <TweakSelect label="Variation" value={t.layout} options={[
        {value:'grid',label:'Grid (balanced)'},
        {value:'command',label:'Command center'},
        {value:'trader',label:'Trader view (max density)'}]} onChange={v=>setTweak('layout',v)}/>
      <TweakRadio label="Density" value={t.density} options={['compact','comfortable']} onChange={v=>setTweak('density',v)}/>
      <TweakSection label="Live data"/>
      <TweakSlider label="Stream speed" value={t.animSpeed} min={0} max={6} step={1} unit="/s" onChange={v=>setTweak('animSpeed',v)}/>
      <TweakSection label="Modules"/>
      <TweakToggle label="KPI cards"         value={t.showKpis}     onChange={v=>setTweak('showKpis',v)}/>
      <TweakToggle label="Live feed"         value={t.showFeed}     onChange={v=>setTweak('showFeed',v)}/>
      <TweakToggle label="Risk distribution" value={t.showRiskDist} onChange={v=>setTweak('showRiskDist',v)}/>
      <TweakToggle label="Velocity"          value={t.showVelocity} onChange={v=>setTweak('showVelocity',v)}/>
      <TweakToggle label="Bank breakdown"    value={t.showBanks}    onChange={v=>setTweak('showBanks',v)}/>
      <TweakToggle label="Category mix"      value={t.showCategory} onChange={v=>setTweak('showCategory',v)}/>
      <TweakToggle label="Geographic"        value={t.showGeo}      onChange={v=>setTweak('showGeo',v)}/>
      <TweakToggle label="Attack patterns"   value={t.showPatterns} onChange={v=>setTweak('showPatterns',v)}/>
      <TweakToggle label="Mule network"      value={t.showMule}     onChange={v=>setTweak('showMule',v)}/>
      <TweakToggle label="Model performance" value={t.showModel}    onChange={v=>setTweak('showModel',v)}/>
      <TweakToggle label="Alert feed"        value={t.showAlerts}   onChange={v=>setTweak('showAlerts',v)}/>
    </TweaksPanel>
  );
}

function App(){
  const [t, setTweak]     = useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = useState('overview');
  const [feed, setFeed]   = useState(()=>genFeed(60));
  const [alerts, setAlerts] = useState(ALERTS_SEED);
  const [selected, setSelected] = useState(null);
  const [filter, setFilter] = useState({kind:'all', bank:null});
  const [paused, setPaused] = useState(false);
  const [time, setTime]   = useState(()=>new Date().toTimeString().slice(0,8)+' IST');

  useEffect(()=>{
    const i = setInterval(()=>setTime(new Date().toTimeString().slice(0,8)+' IST'), 1000);
    return ()=>clearInterval(i);
  },[]);

  useEffect(()=>{
    if(paused || t.animSpeed===0) return;
    const interval = 1000 / t.animSpeed;
    const i = setInterval(()=>{
      const tx = genTxn();
      setFeed(f => [tx, ...f].slice(0,80));
      if(tx.flag==='BLOCK' && Math.random()<0.5){
        setAlerts(a => [{
          level: tx.risk>=85?'CRIT':'WARN',
          msg: `${tx.category} ${('₹'+tx.amount.toLocaleString('en-IN'))} · risk ${tx.risk} · ${tx.city}`,
          time: tx.timestamp.toTimeString().slice(0,8),
          txn: tx.id,
        }, ...a].slice(0,12));
      }
    }, interval);
    return ()=>clearInterval(i);
  },[t.animSpeed, paused]);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme', t.theme);
    document.documentElement.style.setProperty('--accent', t.accent);
    document.documentElement.style.setProperty('--accent-soft', t.accent+'24');
  },[t.theme, t.accent]);

  const onAction = (act, txn) => {
    setAlerts(a => [{
      level: act==='block'?'CRIT':act==='review'?'WARN':'INFO',
      msg: `Analyst action: ${act.toUpperCase()} on ${txn.id}`,
      time: new Date().toTimeString().slice(0,8),
      txn: txn.id,
    }, ...a].slice(0,12));
    setSelected(null);
  };

  const Page = (()=>{
    switch(active){
      case 'overview': return <OverviewPage tweaks={t} feed={feed} alerts={alerts} onSelectTxn={setSelected} filter={filter} setFilter={setFilter} paused={paused} setPaused={setPaused}/>;
      case 'feed':     return (<><div className="page-hd"><h1>Live Transaction Feed</h1><span className="crumbs">/ ops / feed</span></div><LiveFeed feed={feed} filter={filter} setFilter={setFilter} onSelect={setSelected} animSpeed={t.animSpeed} dense={false} paused={paused} setPaused={setPaused}/><div className="row r3"><RiskDistribution/><VelocityCard/><AttackPatterns/></div></>);
      case 'risk':     return (<><div className="page-hd"><h1>Risk Models</h1><span className="crumbs">/ intel / models</span></div><ModelPerf/><div className="row r2"><RiskDistribution/><AttackPatterns/></div></>);
      case 'mule':     return (<><div className="page-hd"><h1>Mule Network</h1><span className="crumbs">/ intel / mule</span></div><MuleNetwork/><div className="row r2"><AttackPatterns/><GeoAnomaly/></div></>);
      case 'geo':      return (<><div className="page-hd"><h1>Geographic Anomalies</h1><span className="crumbs">/ intel / geo</span></div><div className="row r2"><GeoAnomaly/><MuleNetwork/></div></>);
      case 'banks':    return (<><div className="page-hd"><h1>Bank Analytics</h1><span className="crumbs">/ intel / banks</span></div><BankBreakdown/><div className="row r2"><CategoryMix/><RiskDistribution/></div></>);
      case 'alerts':   return (<><div className="page-hd"><h1>Alert Stream</h1><span className="crumbs">/ ops / alerts</span></div><AlertFeed alerts={alerts}/><div className="row r2"><AttackPatterns/><VelocityCard/></div></>);
      case 'patterns': return (<><div className="page-hd"><h1>Attack Patterns</h1><span className="crumbs">/ intel / patterns</span></div><AttackPatterns/><div className="row r2"><MuleNetwork/><GeoAnomaly/></div></>);
      case 'analyst':  return (<><div className="page-hd"><h1>Analyst Performance</h1><span className="crumbs">/ system / analysts</span></div><AlertFeed alerts={alerts}/></>);
      default:         return (<><div className="page-hd"><h1>Settings</h1><span className="crumbs">/ system / settings</span></div><div className="card"><span className="dim">Use the Tweaks panel (bottom-right).</span></div></>);
    }
  })();

  return (
    <div className={'app layout-'+t.layout+(t.density==='compact'?' dense':'')}>
      <Topbar time={time}/>
      <Sidebar active={active} setActive={setActive}/>
      <main className="main">{Page}</main>
      {selected && <TxnDrawer txn={selected} onClose={()=>setSelected(null)} onAction={onAction}/>}
      <AppTweaks t={t} setTweak={setTweak}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
